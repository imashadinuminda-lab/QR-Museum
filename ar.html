<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Museum AR</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="info">
  Point camera at exhibit image
</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">

  <a-assets>

    <a-asset-item
      id="aircraftModel"
      src="models/tiger_moth.glb">
    </a-asset-item>

    <img
      id="pilotImage"
      src="assets/images/pilot.png">

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Aircraft -->
    <a-gltf-model
      src="#aircraftModel"
      position="0 0 0"
      rotation="0 180 0"
      scale="0.6 0.6 0.6">
    </a-gltf-model>

    <!-- Pilot -->
    <a-image
      id="pilot"
      class="clickable"
      src="#pilotImage"
      position="0.9 0 0"
      width="0.5"
      height="0.8">
    </a-image>

    <!-- Title -->
    <a-text
      value="Tiger Moth Aircraft"
      position="0 1 0"
      align="center"
      color="white"
      width="4">
    </a-text>

  </a-entity>

</a-scene>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const pilot = document.querySelector("#pilot");

  // 🔥 Use BOTH click + touch for mobile reliability
  function speakPilot() {

    const speech = new SpeechSynthesisUtterance(
      "Welcome to the Air Force Museum. This Tiger Moth aircraft was used for basic pilot training and played an important role in developing future Air Force pilots."
    );

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.speak(speech);
  }

  pilot.addEventListener("click", speakPilot);
  pilot.addEventListener("touchstart", speakPilot);

  const target = document.querySelector("[mindar-image-target]");

  target.addEventListener("targetFound", () => {
    console.log("Target detected");
  });

  target.addEventListener("targetLost", () => {
    console.log("Target lost");
  });

});

</script>

</body>
</html>
