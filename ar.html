<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Museum</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false">

  <a-camera></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Aircraft (temporary placeholder) -->
    <a-box position="0 0 0" color="gray" scale="0.5 0.5 0.5"></a-box>

    <!-- Virtual Pilot -->
    <a-box position="1 0 0" color="blue" scale="0.3 0.6 0.3"></a-box>

    <!-- Label -->
    <a-text value="Smart Museum AR"
            position="0 1 0"
            color="white"
            align="center">
    </a-text>

  </a-entity>

</a-scene>

</body>
</html>
