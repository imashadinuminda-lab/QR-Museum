<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Museum AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true">

  <a-camera position="0 0 0"></a-camera>

  <!-- AR TARGET (when image detected) -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Aircraft -->
    <a-box position="0 0 0"
           color="gray"
           scale="0.6 0.6 0.6">
    </a-box>

    <!-- Virtual Pilot -->
    <a-sphere position="1 0 0"
              color="blue"
              radius="0.3">
    </a-sphere>

    <!-- Text -->
    <a-text value="Museum Guide Active"
            position="0 1 0"
            align="center"
            color="white">
    </a-text>

  </a-entity>

  <!-- 🟢 FALLBACK (IMPORTANT FIX) -->
  <!-- This shows even if tracking fails -->
  <a-box position="0 0 -3"
         color="red"
         scale="0.5 0.5 0.5">
  </a-box>

</a-scene>

</body>
</html>
