<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Museum AR</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="info">
  Point camera at exhibit image
</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">

  <!-- LIGHTING (VERY IMPORTANT FOR 3D LOOK) -->
  <a-entity light="type: ambient; intensity: 0.7"></a-entity>
  <a-entity light="type: directional; intensity: 1.2" position="2 3 1"></a-entity>

  <a-assets>

    <a-asset-item
      id="aircraftModel"
      src="models/tiger_moth.glb">
    </a-asset-item>

    <img
      id="pilotImage"
      src="assets/images/pilot.png">

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- GROUND (SHADOW RECEIVER) -->
    <a-plane
      position="0 -0.6 0"
      rotation="-90 0 0"
      width="5"
      height="5"
      color="#444"
      shadow="receive: true">
    </a-plane>

    <!-- AIRCRAFT -->
    <a-gltf-model
      src="#aircraftModel"
      position="0 0 0"
      rotation="0 180 0"
      scale="0.6 0.6 0.6"
      shadow="cast: true; receive: true">
    </a-gltf-model>

    <!-- PILOT -->
    <a-image
      id="pilot"
      class="clickable"
      src="#pilotImage"
      position="0.9 0 0"
      width="0.5"
      height="0.8"
      shadow="cast: true">
    </a-image>

    <!-- TITLE -->
    <a-entity position="0 1 0">
      <a-text
        value="Tiger Moth"
        align="center"
        color="#ffffff"
        width="4"
        shader="msdf">
      </a-text>
    </a-entity>

    <!-- ===================== -->
    <!-- ✈ REAL 3D DIMENSIONS -->
    <!-- ===================== -->

    <!-- 🔴 LENGTH -->
    <a-cylinder
      position="0 -0.4 0"
      radius="0.01"
      height="1.6"
      rotation="0 0 90"
      color="red"
      opacity="0.9">
    </a-cylinder>

    <a-text
      value="Length: 7.3 m"
      position="0 -0.25 0.3"
      color="red"
      align="center"
      width="3">
    </a-text>

    <!-- 🟢 WINGSPAN -->
    <a-cylinder
      position="0 0.6 0"
      radius="0.01"
      height="2.2"
      rotation="90 0 0"
      color="green"
      opacity="0.9">
    </a-cylinder>

    <a-text
      value="Wingspan: 8.9 m"
      position="0 0.75 0.3"
      color="green"
      align="center"
      width="3">
    </a-text>

    <!-- 🔵 HEIGHT -->
    <a-cylinder
      position="-0.9 0 0"
      radius="0.01"
      height="1.2"
      color="blue"
      opacity="0.9">
    </a-cylinder>

    <a-text
      value="Height: 2.7 m"
      position="-1.1 0.5 0.2"
      color="blue"
      align="center"
      width="3">
    </a-text>

  </a-entity>

</a-scene>

<script>

document.addEventListener("DOMContentLoaded", () => {

  const pilot = document.querySelector("#pilot");

  function speakPilot() {

    const speech = new SpeechSynthesisUtterance(
      "Welcome to the Air Force Museum. This Tiger Moth aircraft was used for basic pilot training. It has a length of 7.3 meters, wingspan of 8.9 meters, and height of 2.7 meters."
    );

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.speak(speech);
  }

  pilot.addEventListener("click", speakPilot);
  pilot.addEventListener("touchstart", speakPilot);

});

</script>

</body>
</html>
