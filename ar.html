<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Museum AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div id="info">
  Point your camera at the exhibit image.
</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true">

  <!-- Assets -->
  <a-assets>
    <a-asset-item
      id="aircraftModel"
      src="models/tiger_moth.glb">
    </a-asset-item>
  </a-assets>

  <!-- Camera -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Image Target -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Aircraft Model -->
    <a-gltf-model
      src="#aircraftModel"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.3 0.3 0.3">
    </a-gltf-model>

    <!-- Virtual Guide -->
    <a-sphere
      position="1 0 0"
      radius="0.2"
      color="blue">
    </a-sphere>

    <!-- Title -->
    <a-text
      value="Tiger Moth"
      position="0 1 0"
      align="center"
      color="white"
      width="4">
    </a-text>

  </a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const target = document.querySelector("[mindar-image-target]");

  target.addEventListener("targetFound", () => {
    console.log("Target detected");
  });

  target.addEventListener("targetLost", () => {
    console.log("Target lost");
  });

});
</script>

</body>
</html>
