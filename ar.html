<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Museum AR</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 8px;
      font-family: Arial;
    }
  </style>
</head>

<body>

<div id="info">
  Point camera at exhibit image
</div>

<!-- 🔊 AUDIO FILE -->
<audio id="museumAudio" src="assets/audio/tiger_moth.mp3" preload="auto"></audio>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  cursor="rayOrigin: mouse"
  raycaster="objects: .clickable">

  <!-- LIGHTING -->
  <a-entity light="type: ambient; intensity: 0.7"></a-entity>
  <a-entity light="type: directional; intensity: 1.2" position="2 3 1"></a-entity>

  <a-assets>

    <a-asset-item
      id="aircraftModel"
      src="models/tiger_moth.glb">
    </a-asset-item>

    <img
      id="pilotImage"
      src="assets/images/pilot.png">

  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- ================= AR TARGET ================= -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- AIRCRAFT -->
    <a-gltf-model
      src="#aircraftModel"
      position="0 0 0"
      rotation="0 180 0"
      scale="0.6 0.6 0.6"
      shadow="cast: true">
    </a-gltf-model>

    <!-- PILOT -->
    <a-image
      id="pilot"
      src="#pilotImage"
      position="0.9 0 0"
      width="0.5"
      height="0.8"
      class="clickable">
    </a-image>

    <!-- TITLE -->
    <a-text
      value="Tiger Moth"
      position="0 1 0"
      align="center"
      color="white"
      width="4">
    </a-text>

    <!-- ================= 3D AUDIO BUTTON ================= -->
    <a-cylinder
      id="audioBtn3D"
      class="clickable"
      position="-0.9 0 0"
      radius="0.2"
      height="0.05"
      color="#007bff"
      shadow="cast: true">
    </a-cylinder>

    <a-text
      value="PLAY AUDIO"
      position="-0.9 0.15 0"
      align="center"
      color="white"
      width="2">
    </a-text>

  </a-entity>

</a-scene>

<!-- ================= SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const audio = document.getElementById("museumAudio");
  const btn = document.querySelector("#audioBtn3D");

  let isPlaying = false;

  // 🔓 FIX: unlock audio for mobile browsers
  function unlockAudio() {
    audio.play().then(() => {
      audio.pause();
      audio.currentTime = 0;
    }).catch(() => {});
  }

  window.addEventListener("click", unlockAudio, { once: true });
  window.addEventListener("touchstart", unlockAudio, { once: true });

  // 🎧 Toggle audio
  function toggleAudio() {

    if (!isPlaying) {
      audio.play();
      isPlaying = true;
      btn.setAttribute("color", "#00cc66");
    } else {
      audio.pause();
      isPlaying = false;
      btn.setAttribute("color", "#007bff");
    }

  }

  // 🟢 Reliable events
  btn.addEventListener("click", toggleAudio);
  btn.addEventListener("touchstart", toggleAudio);

});
</script>

</body>
</html>
