<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Smart Museum AR</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
    #info {
      position: fixed;
      top: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      color:white;
      padding:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<div id="info">Smart Museum AR</div>

<audio id="audio"></audio>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled:false">

  <a-entity light="type:ambient; intensity:0.7"></a-entity>
  <a-entity light="type:directional; intensity:1.2" position="2 3 1"></a-entity>

  <a-assets>
    <a-asset-item id="aircraft" src="models/tiger_moth.glb"></a-asset-item>
    <a-asset-item id="pilotModel" src="models/pilot.glb"></a-asset-item>
  </a-assets>

  <a-camera></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Aircraft -->
    <a-gltf-model src="#aircraft" scale="0.6 0.6 0.6"></a-gltf-model>

    <!-- Pilot -->
    <a-gltf-model
      id="pilot"
      src="#pilotModel"
      scale="0.35 0.35 0.35"
      position="1 0 0">
    </a-gltf-model>

    <!-- AUDIO BUTTON -->
    <a-cylinder id="btn" class="clickable"
      position="-1 0 0"
      radius="0.15"
      color="#007bff">
    </a-cylinder>

    <a-text value="PLAY" position="-1 0.2 0" align="center"></a-text>

  </a-entity>

</a-scene>

<script>
const id = new URLSearchParams(location.search).get("id");
const audio = document.getElementById("audio");
const btn = document.querySelector("#btn");
const pilot = document.querySelector("#pilot");

let data;

fetch("exhibits.json")
.then(r => r.json())
.then(d => {

  data = d[id];
  audio.src = data.audio;

});

btn.addEventListener("click", () => {
  audio.play();
});

btn.addEventListener("touchstart", () => {
  audio.play();
});

/* WALKING PILOT */
const path = [
  {x:1,z:0},{x:0,z:1},{x:-1,z:0},{x:0,z:-1}
];

let i = 0;

setInterval(() => {

  const p = path[i];

  pilot.setAttribute("animation", {
    property:"position",
    to:`${p.x} 0 ${p.z}`,
    dur:2500,
    easing:"linear"
  });

  i = (i+1)%path.length;

}, 2600);

</script>

</body>
</html>
