<!DOCTYPE html>
<html>
<head>
  <title>Smart Museum</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #cbd5e1;
    }

    .container {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    a {
      text-decoration: none;
    }

    button {
      width: 250px;
      padding: 15px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .note {
      margin-top: 30px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>

</head>

<body>

<h1>🏛️ Smart Air Force Museum</h1>
<p>Scan QR codes or select an exhibit to explore voice + AR experience</p>

<div class="container">

  <a href="exhibit.html?id=aircraft_001">
    <button>✈ Tiger Moth (Training Aircraft)</button>
  </a>

  <a href="exhibit.html?id=aircraft_002">
    <button>🚀 Jet Trainer</button>
  </a>

  <a href="exhibit.html?id=aircraft_003">
    <button🚁 Helicopter Exhibit</button>
  </a>

  <a href="exhibit.html?id=aircraft_004">
    <button>⚔ Fighter Jet</button>
  </a>

  <a href="exhibit.html?id=aircraft_005">
    <button>📦 Transport Aircraft</button>
  </a>

</div>

<div class="note">
  📱 Tip: Each exhibit also works with QR code scanning in the museum
</div>

</body>
</html>
