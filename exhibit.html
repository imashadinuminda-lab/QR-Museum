</head>

<body>

<h1 id="title">Loading...</h1>

<img id="slideshow" src="" alt="Exhibit Image">

<p id="caption"></p>

<p id="desc"></p>

<button class="voice-btn" onclick="playVoice()">
🔊 Play Voice Guide
</button>

<button class="ar-btn" onclick="openAR()">
📱 View AR
</button>

<script>

let exhibitData = null;
let images = [];
let currentImage = 0;

const id = new URLSearchParams(window.location.search).get("id");

fetch("exhibits.json")
.then(response => response.json())
.then(data => {

    exhibitData = data[id];

    if(!exhibitData){
        document.body.innerHTML = "<h1>Exhibit Not Found</h1>";
        return;
    }

    document.getElementById("title").innerText = exhibitData.name;
    document.getElementById("desc").innerText = exhibitData.description;

    if(!exhibitData.images || exhibitData.images.length === 0){
        console.log("No images found");
        return;
    }

    images = exhibitData.images;

    document.getElementById("slideshow").src = images[0];

    document.getElementById("caption").innerText =
        "Photo 1 of " + images.length;

    setInterval(changeImage, 3000);

});

function changeImage(){

    if(images.length === 0) return;

    const img = document.getElementById("slideshow");

    img.style.opacity = 0;

    setTimeout(() => {

        currentImage++;

        if(currentImage >= images.length){
            currentImage = 0;
        }

        img.src = images[currentImage];

        document.getElementById("caption").innerText =
            "Photo " + (currentImage + 1) +
            " of " + images.length;

        img.style.opacity = 1;

    }, 300);

}

function playVoice(){

    if(!exhibitData) return;

    let speech = new SpeechSynthesisUtterance(exhibitData.voice);

    speech.rate = 0.9;
    speech.pitch = 1;

    speechSynthesis.speak(speech);

}

function openAR(){

    window.location.href = "ar.html?id=" + id;

}

document.getElementById("slideshow").onerror = function(){

    console.log("Image failed to load:", this.src);

};

</script>

</body>
</html>
