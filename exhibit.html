<!DOCTYPE html>
<html>
<head>
  <title>Exhibit</title>
</head>

<body>

<h1 id="title">Loading...</h1>
<p id="desc"></p>

<button onclick="playVoice()">Play Voice</button>
<button onclick="openAR()">View AR</button>

<script>

const id = new URLSearchParams(window.location.search).get("id");

fetch("exhibits.json")
.then(res => res.json())
.then(data => {

    const ex = data[id];

    if (!ex) {
        document.body.innerHTML = "<h1>Exhibit Not Found</h1>";
        return;
    }

    document.getElementById("title").innerText = ex.name;
    document.getElementById("desc").innerText = ex.description;

    window.voiceText = ex.voice;
});

function playVoice() {
    let speech = new SpeechSynthesisUtterance(window.voiceText);
    speech.rate = 0.9;
    speechSynthesis.speak(speech);
}

function openAR() {
    const id = new URLSearchParams(window.location.search).get("id");
    window.location.href = "ar.html?id=" + id;
}

</script>

</body>
</html>
